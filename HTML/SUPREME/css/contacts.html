<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUPREME® | Contact</title>
  <link rel="stylesheet" href="contacts.css">
</head>
<body class="layout">

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <h1 class="logo">SUPREME</h1>
  </div>
  <nav class="header-right">
    <ul class="nav">
      <li><a href="shop.html">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Account</a></li>
    </ul>
  </nav>
</header>

<!-- MAIN -->
<main class="main">
  <section class="contact">
    <h2>Contact Us</h2>
    <p>We'd love to hear from you! Fill out the form below or reach us at <strong>info@supreme.com</strong>.</p>

    <form class="contact-form">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Your Name" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>

      <label for="message">Message</label>
      <textarea id="message" rows="6" placeholder="Write your message here..." required></textarea>

      <button type="submit">Send</button>
    </form>
  </section>
</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-info">
    <p>© 2026 Supreme New York</p>
    <p>All rights reserved</p>
  </div>
</footer>

</body>
</html>
