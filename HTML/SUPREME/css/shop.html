<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUPREME® | Shop</title>
  <link rel="stylesheet" href="shop.css">
</head>
<body class="layout">

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <h1 class="logo">SUPREME</h1>
  </div>
  <nav class="header-right">
    <ul class="nav">
      <li><a href="shop.html">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Account</a></li>
    </ul>
  </nav>
</header>

<!-- MAIN -->
<main class="main">
  <section class="products">
    <h2 class="section-title">Shop All Products</h2>

    <div class="product-grid">
      <div id="timePanel">00:00:00</div>

      <!-- PRODUCT 1 -->
      <article class="card">
        <img src="abrigo.webp" alt="Nombre del producto" class="product-img"> <!-- 💡 Aquí pones la imagen -->
        <h4>Abrigo</h4>
        <span class="tag">New</span>
      </article>

      <!-- PRODUCT 2 -->
      <article class="card">
        <img src="chanclas.webp" alt="Nombre del producto" class="product-img">
        <h4>Chanclas</h4>
        
        <span class="tag">Limited</span>
      </article>

      <!-- PRODUCT 3 -->
      <article class="card">
        <img src="chaqueta.webp" alt="Nombre del producto" class="product-img">
        <h4>Sudadera</h4>
        
        <span class="tag">Sold Out</span>
      </article>

      <!-- PRODUCT 4 -->
      <article class="card">
        <img src="chaqueta2.webp" alt="Nombre del producto" class="product-img">
        <h4>Chaqueta</h4>
        
        <span class="tag">Drop</span>
      </article>

    </div>
  </section>
</main>
<script src="/HTML/SUPREME/css/timer.js"></script>
<!-- FOOTER -->
<footer class="footer">
  <div class="footer-info">
    <p>© 2026 Supreme New York</p>
    <p>All rights reserved</p>
  </div>
</footer>

</body>
</html>
