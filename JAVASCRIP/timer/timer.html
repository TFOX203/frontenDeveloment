<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="timer.css" />
    <title>Timer</title>
  </head>
  <body>
    <header>
      <label for="" id = "timePanel"></label>
    </header>
    <main>
      <label for="" id="timerDisplay">00:00</label>
      <div id="controls">
        <button id="startBtn" class="control-button">start</button>
        <button id="stopBtn" class="control-button">stop</button>
        <button id="resetBtn" class="control-button">reset</button>
      </div>
    </main>
    <!-- import the js program, the importation of the
     script should be placed below all elements in body tag,
     so that all o them will be loaded by the browser before
     we can access any of them -->
    <script src="timer.js"></script>
  </body>
</html>
